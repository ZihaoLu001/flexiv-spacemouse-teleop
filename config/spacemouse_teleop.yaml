spacemouse_to_servo:
  ros__parameters:
    input_topic: /spacenav/twist
    output_topic: /servo_node/delta_twist_cmds
    publish_hz: 50.0
    frame_id: ""
    input_timeout: 0.25
    linear_scale: 0.20
    angular_scale: 0.40
    deadband: 0.02
    clamp_abs: 1.0
    sign_lx: 1.0
    sign_ly: -1.0
    sign_lz: 1.0
    sign_ax: 1.0
    sign_ay: -1.0
    sign_az: 1.0

spacemouse_gn01:
  ros__parameters:
    joy_topic: /spacenav/joy
    action_name: /flexiv_gripper_node/move
    open_button_idx: 0
    close_button_idx: 1
    open_width: 0.09
    close_width: 0.01
    velocity: 0.10
    max_force: 20.0
    server_wait_timeout: 0.5

